<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Dashboard - Cloud Sync</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/dexie-cloud-addon/dist/dexie-cloud-addon.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>
<body data-theme="light">

<div id="mainApp" style="display:none;">
    </div>

<div id="loadingScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; background:var(--bg-card); z-index:9999;">
    <div class="spinner">Loading your data...</div>
</div>

<script>
// --- DEXIE CLOUD CONFIGURATION ---
const db = new Dexie("BudgetBusinessDB", { addons: [dexieCloud] });

db.version(1).stores({
    incomes: '@id, date, desc',
    expenses: '@id, date, desc, cat',
    unbudgeted: '@id, date, desc',
    liabilities: '@id, date, desc',
    harvests: '@id, desc',
    harvestTransactions: '@id, date, harvestId',
    contributions: '@id, date, contributor',
    businessNotes: '@id, date'
});

db.cloud.configure({
    databaseUrl: "https://z47mg0loj.dexie.cloud",
    requireLogin: true // This forces the Dexie Login popup automatically
});

// --- STATE VARIABLES ---
let incomes=[], expenses=[], unbudgeted=[], liabilities=[], harvests=[], harvestTransactions=[], contributions=[], businessNotes=[], myChart, myTrendChart, currentAddType = '', editId = null, deleteTgt={};
const fullMonths=["January","February","March","April","May","June","July","August","September","October","November","December"];

// --- UTILITIES ---
function formatAmount(v){ return (v < 0 ? "-₱" : "₱") + Math.abs(v).toLocaleString(undefined,{minimumFractionDigits:2}); }
function showToast(m, isError = false) { const t = document.getElementById("toast"); t.innerText = m; t.classList.remove("error", "show"); void t.offsetWidth; if(isError) t.classList.add("error"); t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2500); }
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); }
function closeModal(id){ document.getElementById(id).style.display="none"; editId = null; }
function closeConfirm(){ document.getElementById('deleteConfirmModal').style.display='none'; }
function applyTheme(t) { document.body.setAttribute("data-theme", t); localStorage.setItem("theme", t); }
function toggleTheme(){ applyTheme(document.body.getAttribute("data-theme") === "dark" ? "light" : "dark"); render(); }

// --- AUTH & LOADING ---
async function load() {
    applyTheme(localStorage.getItem("theme") || "light");
    
    // Subscribe to Auth Status
    db.cloud.currentUser.subscribe(user => {
        const loading = document.getElementById("loadingScreen");
        const app = document.getElementById("mainApp");
        
        if (user) {
            // User is authenticated
            if(loading) loading.style.display = "none";
            app.style.display = "block";
            refreshLocalData();
        } else {
            // User is not authenticated - Dexie Cloud will show its own login UI
            if(loading) loading.style.display = "flex";
            app.style.display = "none";
        }
    });

    monthSel.value = "all";
    switchSection(localStorage.getItem("activeTab") || "overview");
}

async function refreshLocalData() {
    incomes = await db.incomes.toArray();
    expenses = await db.expenses.toArray();
    unbudgeted = await db.unbudgeted.toArray();
    liabilities = await db.liabilities.toArray();
    harvests = await db.harvests.toArray();
    harvestTransactions = await db.harvestTransactions.toArray();
    contributions = await db.contributions.toArray();
    businessNotes = await db.businessNotes.toArray();
    render();
}

// Re-render whenever the cloud pushes a change
db.on('changes', () => refreshLocalData());

function logout() { db.cloud.logout(); location.reload(); }

// --- DATA OPERATIONS ---
async function processAdd() {
    if(currentAddType === 'note') {
        const body = document.getElementById('modalNoteBody').value; if(!body.trim()) return;
        const noteData = { date: new Date().toLocaleString(), text: body };
        if(editId !== null) await db.businessNotes.update(editId, noteData);
        else await db.businessNotes.add(noteData);
    } else {
        const date = document.getElementById('modalDate').value, desc = document.getElementById('modalDesc').value, amt = Number(document.getElementById('modalAmount').value);
        if(!date || !amt) return;
        const newData = {date, desc, amount: amt};
        
        if(currentAddType === 'budget') newData.cat = document.getElementById('modalCat').value;
        if(currentAddType === 'contribution') newData.contributor = document.getElementById('modalContributor').value;
        if(currentAddType === 'harvest_expense') newData.harvestId = document.getElementById('modalAccountSelect').value;
        if(currentAddType === 'harvest') newData.amount = amt; 

        const tableMap = { income: db.incomes, budget: db.expenses, unbudget: db.unbudgeted, liability: db.liabilities, contribution: db.contributions, harvest: db.harvests, harvest_expense: db.harvestTransactions };
        const table = tableMap[currentAddType];

        if(editId !== null) await table.update(editId, newData);
        else await table.add(newData);
    }
    closeModal('addModal');
    showToast("Synced!");
    refreshLocalData();
}

document.getElementById('confirmBtn').onclick = async () => {
    const tableMap = { income: db.incomes, exp: db.expenses, un: db.unbudgeted, lia: db.liabilities, con: db.contributions, note: db.businessNotes, har_acc: db.harvests, har_trans: db.harvestTransactions };
    await tableMap[deleteTgt.type].delete(deleteTgt.id);
    closeConfirm();
    refreshLocalData();
};

function deleteItem(type, id){ deleteTgt={type, id:id}; document.getElementById('deleteConfirmModal').style.display='flex'; }

// --- ALL RENDER & CHART FUNCTIONS (STAY THE SAME) ---
function render(){
    const fInc=filterData(incomes), fExp=filterData(expenses), fUn=filterData(unbudgeted), fLia=filterData(liabilities);
    const inc = fInc.reduce((a,b)=>a+b.amount,0), bud = fExp.reduce((a,b)=>a+b.amount,0), unb = fUn.reduce((a,b)=>a+b.amount,0), lia = fLia.reduce((a,b)=>a+b.amount,0), rem = inc-(bud+unb+lia);
    
    document.getElementById("totalIncome").innerText=formatAmount(inc); 
    document.getElementById("totalBudgeted").innerText=formatAmount(bud);
    document.getElementById("totalUnbudgeted").innerText=formatAmount(unb); 
    document.getElementById("totalLiability").innerText=formatAmount(lia); 
    document.getElementById("totalSavings").innerText=formatAmount(rem);

    let totalRevenue = harvests.reduce((a, b) => a + b.amount, 0), totalExpenses = harvestTransactions.reduce((a, b) => a + b.amount, 0), netProfit = totalRevenue - totalExpenses;
    document.getElementById("totalBizProfit").innerText = formatAmount(netProfit);
    document.getElementById("hubBizRev").innerText = formatAmount(totalRevenue);
    document.getElementById("hubBizNet").innerText = formatAmount(netProfit);

    let jConTotal = contributions.filter(c => c.contributor === 'Jerome').reduce((a,b) => a + b.amount, 0);
    let nConTotal = contributions.filter(c => c.contributor === 'Jennifer').reduce((a,b) => a + b.amount, 0);
    let jShare = 0, nShare = 0, shareHtml = "", historyRows = [], jSpent = 0, nSpent = 0;

    harvestTransactions.forEach((t) => {
        let isJ = t.desc.toLowerCase().includes('jerome'), isN = t.desc.toLowerCase().includes('jennifer');
        const acc = harvests.find(h => h.id === t.harvestId);
        if(isJ) {
            let bal = jConTotal - jSpent, ded = Math.min(t.amount, bal), over = t.amount - ded;
            jSpent += ded; if(ded > 0) historyRows.push({ date: t.date, who: 'Jerome', details: `${acc?.desc}: ${t.desc}`, amt: ded });
            if(over > 0) { jShare += over; shareHtml += `<tr><td>${t.date}</td><td>${acc?.desc}</td><td>${t.desc}</td><td style="color:var(--danger)">${formatAmount(over)}</td></tr>`; }
        }
        if(isN) {
            let bal = nConTotal - nSpent, ded = Math.min(t.amount, bal), over = t.amount - ded;
            nSpent += ded; if(ded > 0) historyRows.push({ date: t.date, who: 'Jennifer', details: `${acc?.desc}: ${t.desc}`, amt: ded });
            if(over > 0) { nShare += over; shareHtml += `<tr><td>${t.date}</td><td>${acc?.desc}</td><td>${t.desc}</td><td style="color:var(--danger)">${formatAmount(over)}</td></tr>`; }
        }
    });

    document.getElementById("sumJerome").innerText = formatAmount(jConTotal - jSpent);
    document.getElementById("sumJennifer").innerText = formatAmount(nConTotal - nSpent);
    document.getElementById("shareJerome").innerText = formatAmount(jShare);
    document.getElementById("shareJennifer").innerText = formatAmount(nShare);
    document.getElementById("shareTable").innerHTML = shareHtml || '<tr><td colspan="4" style="text-align:center">No overflow.</td></tr>';
    
    document.getElementById("conTable").innerHTML = contributions.map((c) => `<tr><td>${c.date}</td><td>${c.contributor}</td><td>${c.desc}</td><td>${formatAmount(c.amount)}</td><td><button class="action-edit" onclick="openAddModal('contribution','${c.id}')">Edit</button><button class="action-delete" onclick="deleteItem('con','${c.id}')">Delete</button></td></tr>`).join('');
    document.getElementById("conHistoryTable").innerHTML = historyRows.map(r => `<tr><td>${r.date}</td><td>${r.who}</td><td>${r.details}</td><td>-${formatAmount(r.amt)}</td></tr>`).join('');
    
    const mapper = (type, label) => (d) => `<tr><td>${d.date}</td><td>${d.desc || d.cat}</td><td>${formatAmount(d.amount)}</td><td><button class="action-edit" onclick="openAddModal('${type}','${d.id}')">Edit</button><button class="action-delete" onclick="deleteItem('${label}','${d.id}')">Delete</button></td></tr>`;
    document.getElementById("incomeTable").innerHTML=fInc.map(mapper('income', 'income')).join('');
    document.getElementById("expenseTable").innerHTML=fExp.map(mapper('budget', 'exp')).join('');
    document.getElementById("unTable").innerHTML=fUn.map(mapper('unbudget', 'un')).join('');
    document.getElementById("liaTable").innerHTML=fLia.map(mapper('liability', 'lia')).join('');
    
    updateCharts(bud, unb, lia, rem); renderHarvests(); renderNotes(); updateSavingsTab();
}

function filterData(data){
    return data.filter(d=>{
        let dt=new Date(d.date), mMatch = monthSel.value === "all" || dt.getMonth() == monthSel.value, yMatch = dt.getFullYear() == yearSel.value;
        return mMatch && yMatch;
    });
}

function updateSavingsTab() {
    const curY = yearSel.value, mode = document.getElementById("savingsFilter").value;
    let summary = {}; let grandTotal = 0;
    const all = [...incomes, ...expenses, ...unbudgeted, ...liabilities];
    all.forEach(item => {
        let d = new Date(item.date), y = d.getFullYear(), m = d.getMonth();
        let isInc = incomes.some(i => i.id === item.id);
        let amt = isInc ? item.amount : -item.amount;
        grandTotal += amt;
        if (mode === 'monthly' && y == curY) summary[m] = (summary[m]||0) + amt;
        else if (mode === 'yearly') summary[y] = (summary[y]||0) + amt;
    });
    let h = "";
    if (mode === 'monthly') fullMonths.forEach((m, i) => { if(summary[i] !== undefined) h += `<tr><td>${m} ${curY}</td><td>${formatAmount(summary[i])}</td></tr>`; });
    else if (mode === 'yearly') Object.keys(summary).sort().forEach(y => { h += `<tr><td>Year ${y}</td><td>${formatAmount(summary[y])}</td></tr>`; });
    document.getElementById("savingsTable").innerHTML = h || "<tr><td colspan='2' style='text-align:center'>No activity</td></tr>";
    document.getElementById("grandTotalDisplay").innerText = formatAmount(grandTotal);
}

function updateCharts(b, u, l, r) {
    const ctx = document.getElementById('budgetChart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Budgeted', 'Unbudgeted', 'Debt', 'Saved'], datasets: [{ data: [b, u, l, r > 0 ? r : 0], backgroundColor: ['#2c7be5', '#e17055', '#6c5ce7', '#00cec9'], borderWidth: 0 }] }, options: { maintainAspectRatio: false } });
    const curYear = yearSel.value;
    let monthlyIncome = Array(12).fill(0), monthlyExpense = Array(12).fill(0);
    const proc = (arr, tArr) => arr.forEach(it => { let d = new Date(it.date); if(d.getFullYear()==curYear) tArr[d.getMonth()] += it.amount; });
    proc(incomes, monthlyIncome); proc(expenses, monthlyExpense); proc(unbudgeted, monthlyExpense); proc(liabilities, monthlyExpense);
    const ctxTrend = document.getElementById('monthlyTrendChart').getContext('2d');
    if (myTrendChart) myTrendChart.destroy();
    myTrendChart = new Chart(ctxTrend, { type: 'bar', data: { labels: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"], datasets: [{ label: 'Income', data: monthlyIncome, backgroundColor: '#00b894' }, { label: 'Expense', data: monthlyExpense, backgroundColor: '#ff4757' }] }, options: { maintainAspectRatio: false } });
}

function renderHarvests() {
    const container = document.getElementById('harvestContainer');
    let totalRev = harvests.reduce((a, b) => a + b.amount, 0), totalExp = harvestTransactions.reduce((a, b) => a + b.amount, 0), netProfit = totalRev - totalExp;
    document.getElementById("harvTotalRev").innerText = formatAmount(totalRev);
    document.getElementById("harvTotalExp").innerText = formatAmount(totalExp);
    document.getElementById("harvTotalNet").innerText = formatAmount(netProfit);
    if (harvests.length === 0) { container.innerHTML = `<p style="text-align:center; color:#888;">No harvest accounts.</p>`; return; }
    container.innerHTML = harvests.map((acc) => {
        const trans = harvestTransactions.filter(t => t.harvestId === acc.id);
        const profit = acc.amount - trans.reduce((a, b) => a + b.amount, 0);
        const list = trans.map(t => `<div style="font-size:12px; padding:4px 0; border-bottom:1px dashed #eee; display:flex; justify-content:space-between;"><span>${t.date} - ${t.desc}</span><span style="color:var(--danger)">-${formatAmount(t.amount)} <button class="action-delete" style="text-decoration:none;" onclick="deleteItem('har_trans', '${t.id}')">×</button></span></div>`).join('');
        return `<div class="note-card" style="border-left: 4px solid var(--success);"><strong style="color:var(--primary); font-size:16px;">${acc.desc}</strong><br><small>Starting: ${formatAmount(acc.amount)}</small><div style="margin:10px 0; background:rgba(0,0,0,0.02); padding:10px; border-radius:8px;">${list || 'No expenses'}</div><div><strong>Profit: ${formatAmount(profit)}</strong></div><div style="margin-top:10px;"><button class="action-edit" onclick="openAddModal('harvest', '${acc.id}')">Edit</button><button class="action-delete" style="margin-left:10px;" onclick="deleteItem('har_acc', '${acc.id}')">Delete</button></div></div>`;
    }).join('');
}

function renderNotes() {
    const container = document.getElementById('notesContainer');
    let html = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;"><h3>Notes</h3><button class="add-btn" onclick="openAddModal('note')">+ Add Note</button></div>`;
    if (businessNotes.length === 0) { container.innerHTML = html + `<p style="text-align:center; color:#888;">No notes.</p>`; return; }
    html += businessNotes.sort((a,b)=>b.id-a.id).map(n => `<div class="note-card"><div><small>${n.date}</small></div><div style="margin-top:5px; white-space: pre-wrap;">${n.text}</div><div style="margin-top:10px;"><button class="action-edit" onclick="openAddModal('note', '${n.id}')">Edit</button><button class="action-delete" onclick="deleteItem('note', '${n.id}')">Delete</button></div></div>`).join('');
    container.innerHTML = html;
}

// --- UI NAVIGATION & SETUP ---
function switchSection(id, el){
    const genTabs = ['overview', 'income', 'budget', 'unbudget', 'liability', 'savings'];
    const bizTabs = ['business-hub', 'contribution', 'profitshare', 'harvest', 'business-notes'];
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); 
    const target = document.getElementById(id);
    if(target) target.classList.add('active');
    
    if(genTabs.includes(id)) {
        document.getElementById('subNavGeneral').style.display = 'flex';
        document.getElementById('subNavBusiness').style.display = 'none';
        document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('selected'));
        document.getElementById('nav-overview').classList.add('selected');
    } else if(bizTabs.includes(id)) {
        document.getElementById('subNavGeneral').style.display = 'none';
        document.getElementById('subNavBusiness').style.display = 'flex';
        document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('selected'));
        document.getElementById('nav-business-hub').classList.add('selected');
    }
    document.querySelectorAll('.sub-nav-link').forEach(l => l.classList.remove('active'));
    const link = document.getElementById('link-' + id);
    if(link) link.classList.add('active');
    if(el && window.innerWidth<768) toggleSidebar(); 
    localStorage.setItem("activeTab", id);
    render();
}

function openAddModal(type, id = null) {
    if (type === 'harvest_expense' && harvests.length === 0) { showToast("Create Harvest Account first!", true); return; }
    currentAddType = type; editId = id;
    document.getElementById('modalTitle').innerText = (id !== null ? 'Edit ' : 'Add ') + type.replace('-', ' ');
    document.getElementById('modalCatBox').style.display = type==='budget'?'block':'none';
    document.getElementById('modalAccountBox').style.display = type==='harvest_expense'?'block':'none';
    document.getElementById('modalContributorBox').style.display = type==='contribution'?'block':'none';
    document.getElementById('modalDescBox').style.display = (type==='budget' || type==='note')?'none':'block';
    
    if(type === 'harvest_expense') {
        const accSelect = document.getElementById('modalAccountSelect');
        accSelect.innerHTML = harvests.map(h => `<option value="${h.id}">${h.desc}</option>`).join('');
    }
    
    if(type === 'note') {
        document.getElementById('standardFields').style.display = 'none';
        document.getElementById('noteFields').style.display = 'block';
        if(id !== null) { 
            const note = businessNotes.find(n => n.id === id); 
            document.getElementById('modalNoteBody').value = note.text; 
        } else { document.getElementById('modalNoteBody').value = ''; }
    } else {
        document.getElementById('standardFields').style.display = 'block'; 
        document.getElementById('noteFields').style.display = 'none';
        if(id !== null) {
            const tableMap = { income: incomes, budget: expenses, unbudget: unbudgeted, liability: liabilities, contribution: contributions, harvest: harvests };
            const entry = tableMap[type].find(x => x.id === id);
            document.getElementById('modalDate').value = entry.date;
            document.getElementById('modalDesc').value = entry.desc || '';
            document.getElementById('modalAmount').value = entry.amount;
            if(type === 'budget') document.getElementById('modalCat').value = entry.cat;
            if(type === 'contribution') document.getElementById('modalContributor').value = entry.contributor;
        } else {
            document.getElementById('modalDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('modalDesc').value = ''; document.getElementById('modalAmount').value = '';
        }
    }
    document.getElementById('addModal').style.display = 'flex';
}

const monthSel=document.getElementById("month"), yearSel=document.getElementById("year");
fullMonths.forEach((m, i) => monthSel.innerHTML+=`<option value="${i}">${m}</option>`);
monthSel.innerHTML += `<option value="all">All Months</option>`;
for(let y=2024; y<=2035; y++) yearSel.innerHTML+=`<option>${y}</option>`;
yearSel.value=new Date().getFullYear();
monthSel.onchange=render; yearSel.onchange=render;

function triggerFullReset() { document.getElementById('resetModal').style.display = 'flex'; }
async function executeFullReset() { await db.delete(); location.reload(); }

// INITIALIZE
load();
</script>
</body>
</html>
